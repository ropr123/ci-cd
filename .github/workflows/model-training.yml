name: Model Training Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  train-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install pip3 and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create necessary folders
        run: |
          mkdir -p data model reports

      - name: Prepare Data
        run: python scripts/data_prep.py

      - name: Train Model
        run: python modelling/train_model.py

      - name: Test Model
        run: python modelling/test_model.py

      - name: Validate Model
        run: python modelling/validate_model.py

      - name: Save Model and Reports as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-and-reports
          path: |
            model/
            reports/
