name: Model Training Workflow

on:
  push:
    branches: [ master ]
    paths:
      - 'data/**'
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  train-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install pip3 and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
          create_credentials_file: true
          export_environment_variables: true

      - name: Create necessary folders
        run: |
          mkdir -p data model reports

      - name: Pull data from DVC
        run: dvc pull

      - name: Prepare Data
        run: python scripts/data_prep.py

      - name: Train Model
        run: python modelling/train_model.py

      - name: Test Model
        run: python modelling/test_model.py

      - name: Validate Model
        run: python modelling/validate_model.py

      - name: Save Model and Reports as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-and-reports
          path: |
            model/
            reports/
